name: Enable real iOS web push

on:
  push:
    paths:
      - .github/workflows/codex-vapid-v29.yml

permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply real push patch
        run: python scripts/codex-vapid-v29.py
      - name: Verify sources
        run: |
          python -m py_compile scripts/codex-vapid-v29.py api/index.py
          node --check src/renderer/assets/system-upgrade-v29.js
          grep -q 'def vapid_key_pair' api/index.py
          grep -q 'ttl=120' api/index.py
          grep -q 'refreshRealPushSubscription' src/renderer/assets/system-upgrade-v29.js
          ! grep -q 'QR-код для входа' src/renderer/index.html
      - name: Build production output
        run: |
          npm install
          npm run build:vercel
          node --check public/assets/system-upgrade-v29.js
          grep -q 'data-device-code-login' public/index.html
      - name: Commit push implementation
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add api/index.py src/renderer/index.html src/renderer/assets/system-upgrade-v29.js
          git commit -m "fix(push): enable immediate Web Push for installed iOS app"
          git push
