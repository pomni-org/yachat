async function encodePhotoAttachment(file) {
  const objectUrl = URL.createObjectURL(file);
  try {
    const image = await loadImageElement(objectUrl);
    const oversized = file.size > PHOTO_RULE_LIMIT_BYTES;
    const maxSide = oversized ? 1280 : PHOTO_OUTPUT_MAX_SIDE;
    const scale = Math.min(1, maxSide / Math.max(image.naturalWidth || image.width, image.naturalHeight || image.height));
    const width = Math.max(1, Math.round((image.naturalWidth || image.width) * scale));
    const height = Math.max(1, Math.round((image.naturalHeight || image.height) * scale));
    const canvas = document.createElement("canvas");
    const context = canvas.getContext("2d");
    canvas.width = width;
    canvas.height = height;
    context.imageSmoothingEnabled = true;
    context.imageSmoothingQuality = "high";
    context.drawImage(image, 0, 0, width, height);
    const preservePng = file.type === "image/png" && !oversized && file.size <= 2.5 * 1024 * 1024;
    let dataUrl = canvas.toDataURL(preservePng ? "image/png" : "image/jpeg", oversized ? 0.68 : 0.86);
    if (dataUrl.length > 4_200_000 && !preservePng) {
      dataUrl = canvas.toDataURL("image/jpeg", oversized ? 0.58 : 0.72);
    }
    return { dataUrl, degraded: oversized || dataUrl.length < Math.ceil(file.size * 1.28) };
  } finally {
    URL.revokeObjectURL(objectUrl);
  }
}

async function readAttachmentFile(file, mode = "media") {
  if (!file) {
    throw new Error(t("errSendMessage"));
  }

  const mime = file.type || "application/octet-stream";
  const asDocument = mode === "document";
  if (asDocument && file.size > DOCUMENT_TRANSPORT_LIMIT_BYTES) {
    throw new Error(t("attachLimit"));
  }
  if (!asDocument && !mime.startsWith("image/") && file.size > DOCUMENT_TRANSPORT_LIMIT_BYTES) {
    throw new Error(t("attachLimit"));
  }

  const encoded = !asDocument && mime.startsWith("image/")
    ? await encodePhotoAttachment(file)
    : { dataUrl: await readFileAsDataUrl(file), degraded: false };

  return {
    id: globalThis.crypto?.randomUUID ? globalThis.crypto.randomUUID() : `att-${Date.now()}-${Math.random()}`,
    name: file.name || "file",
    mime,
    kind: asDocument ? "file" : mime.startsWith("image/") ? "image" : mime.startsWith("video/") ? "video" : "file",
    size: file.size,
    originalSize: file.size,
    sendAsDocument: asDocument,
    degraded: encoded.degraded,
    dataUrl: encoded.dataUrl
  };
}

function attachmentTypeLabel(attachment) {
  if (attachment.sendAsDocument || attachment.kind === "file") {
    return t("attachmentDocument");
  }
  return t(attachment.kind === "video" ? "attachmentVideo" : "attachmentPhoto");
}

function renderAttachmentTray() {
  if (!attachmentTray) {
    return;
  }

  const hasAttachments = state.pendingAttachments.length > 0;
  attachmentTray.hidden = !hasAttachments;
  if (attachmentPolicy) {
    attachmentPolicy.hidden = !hasAttachments;
    attachmentPolicy.innerHTML = hasAttachments
      ? `<strong>${escapeHtml(t("attachmentPolicyTitle"))}</strong> ${escapeHtml(t("attachmentPolicyText"))}`
      : "";
  }

  attachmentTray.innerHTML = state.pendingAttachments.map((attachment) => {
    const isPhoto = attachment.kind === "image" && !attachment.sendAsDocument;
    const isVideo = attachment.kind === "video" && !attachment.sendAsDocument;
    const preview = isPhoto
      ? `<img src="${escapeHtml(attachment.dataUrl)}" alt="" />`
      : isVideo
        ? `<video src="${escapeHtml(attachment.dataUrl)}" muted playsinline></video>`
        : iconSvg("file-text");
    return `
      <article class="attachment-preview${attachment.sendAsDocument ? " is-document" : ""}">
        <button class="attachment-preview-delete" type="button" data-remove-attachment="${escapeHtml(attachment.id)}" aria-label="${escapeHtml(t("menuDelete"))}">${iconSvg("trash")}</button>
        <div class="attachment-preview-media">${preview}</div>
        <button class="attachment-preview-remove" type="button" data-remove-attachment="${escapeHtml(attachment.id)}" aria-label="${escapeHtml(t("cancel"))}">${iconSvg("x")}</button>
        <div class="attachment-preview-copy">
          <strong>${escapeHtml(attachment.name)}</strong>
          <small>${escapeHtml(attachmentTypeLabel(attachment))} · ${escapeHtml(formatFileSize(attachment.size))}</small>
        </div>
      </article>`;
  }).join("");

  const chat = getActiveChat();
  if (sendButton) {
    sendButton.disabled = !canSendToChat(chat) || (!messageInput.value.trim() && state.pendingAttachments.length === 0);
  }
}

async function addAttachments(files, mode = "media") {
  if (!canSendToChat(getActiveChat())) {
    [attachmentInput, documentInput].forEach((input) => {
      if (input) input.value = "";
    });
    return;
  }

  const selected = [...(files || [])].slice(0, 8 - state.pendingAttachments.length);
  try {
    const next = await Promise.all(selected.map((file) => readAttachmentFile(file, mode)));
    state.pendingAttachments = [...state.pendingAttachments, ...next].slice(0, 8);
    renderAttachmentTray();
  } catch (error) {
    showActionFeedback(translatedServerMessage(error.message, "errSendMessage"), { tone: "error", icon: "circle-alert", duration: 4200 });
  } finally {
    [attachmentInput, documentInput].forEach((input) => {
      if (input) input.value = "";
    });
  }
}
'''
