name: apply composer v10
on:
  push:
    branches: [main]
    paths: [".github/workflows/upgrade-composer-v10.yml"]
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: apply and validate
        run: |
          set -euo pipefail
          python3 scripts/patch-v10-index.py
          python3 scripts/patch-v10-app-core.py
          python3 scripts/patch-v10-attachments.py
          python3 scripts/patch-v10-events.py
          node --check src/renderer/app.js
          python3 -m py_compile api/index.py
          node scripts/build-vercel.cjs
          test -f public/assets/composer-upgrade.css
          grep -q 'data-action="attach-document"' public/index.html
          grep -q 'attachment-preview' public/app.js
          rm -f scripts/patch-v10-index.py scripts/patch-v10-app-core.py scripts/patch-v10-attachments.py scripts/patch-v10-events.py
          rm -f .github/workflows/upgrade-composer-v10.yml
          git config user.name "YaChat Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "feat(composer): превью, документы, порядок иконок и hd-аватары [skip ci]"
          git push
