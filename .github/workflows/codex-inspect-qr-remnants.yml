name: Inspect QR remnants

on:
  push:
    paths:
      - .github/workflows/codex-inspect-qr-remnants.yml

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Save remaining QR references
        run: |
          grep -RniE 'qr|кьюар|QR-код|QR code' api src vercel.json package.json --exclude='*.png' --exclude='*.ico' > qr-remnants.txt || true
      - name: Commit report
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add qr-remnants.txt
          git commit -m "chore(auth): record remaining QR references"
          git push
