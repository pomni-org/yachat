name: Enable real Web Push

on:
  push:
    paths:
      - .github/workflows/codex-enable-web-push.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch API push runtime
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("api/index.py")
          text = path.read_text(encoding="utf-8")

          if "import base64\n" not in text:
              text = text.replace("import hashlib\n", "import base64\nimport hashlib\n", 1)

          marker = "def send_push_to_user(user_id: str, title: str, body: str, url: str) -> None:\n"
          helper = '''P256_ORDER = 0xFFFFFFFF00000000FFFFFFFFFFFFFFFFBCE6FAADA7179E84F3B9CAC2FC632551


def base64url(data: bytes) -> str:
    return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")


def vapid_keypair() -> tuple[str, str]:
    public_env = os.getenv("YACHAT_VAPID_PUBLIC_KEY", "").strip()
    private_env = os.getenv("YACHAT_VAPID_PRIVATE_KEY", "").strip()
    if public_env and private_env:
        return public_env, private_env

    try:
        from cryptography.hazmat.primitives import serialization
        from cryptography.hazmat.primitives.asymmetric import ec
    except Exception:
        return "", ""

    digest = hmac.new(
        auth_secret().encode("utf-8"),
        b"yachat-web-push-v1",
        hashlib.sha256,
    ).digest()
    private_value = int.from_bytes(digest, "big") % (P256_ORDER - 1) + 1
    private_key = ec.derive_private_key(private_value, ec.SECP256R1())
    public_raw = private_key.public_key().public_bytes(
        serialization.Encoding.X962,
        serialization.PublicFormat.UncompressedPoint,
    )
    private_pem = private_key.private_bytes(
        serialization.Encoding.PEM,
        serialization.PrivateFormat.PKCS8,
        serialization.NoEncryption(),
    ).decode("ascii")
    return base64url(public_raw), private_pem


'''
          if "def vapid_keypair()" not in text:
              if marker not in text:
                  raise SystemExit("send_push_to_user marker not found")
              text = text.replace(marker, helper + marker, 1)

          old_keys = '''    public_key = os.getenv("YACHAT_VAPID_PUBLIC_KEY", "").strip()
    private_key = os.getenv("YACHAT_VAPID_PRIVATE_KEY", "").strip()
    if not public_key or not private_key:
        return
'''
          new_keys = '''    public_key, private_key = vapid_keypair()
    if not public_key or not private_key:
        return
'''
          if old_keys in text:
              text = text.replace(old_keys, new_keys, 1)

          text = text.replace(
              'claims = {"sub": os.getenv("YACHAT_VAPID_SUBJECT", "mailto:admin@yachat.local")}',
              'claims = {"sub": os.getenv("YACHAT_VAPID_SUBJECT", "mailto:push@yachat.vercel.app")}',
              1,
          )

          old_public = '''@app.get("/api/push/public-key")
def push_public_key():
    key = os.getenv("YACHAT_VAPID_PUBLIC_KEY", "").strip()
    return {"enabled": bool(key), "publicKey": key}
'''
          new_public = '''@app.get("/api/push/public-key")
def push_public_key():
    public_key, private_key = vapid_keypair()
    return {"enabled": bool(public_key and private_key), "publicKey": public_key}
'''
          if old_public not in text and new_public not in text:
              raise SystemExit("push_public_key block not found")
          text = text.replace(old_public, new_public, 1)

          text = text.replace(
              '"notifications": bool(os.getenv("YACHAT_VAPID_PUBLIC_KEY") and os.getenv("YACHAT_VAPID_PRIVATE_KEY")),',
              '"notifications": bool(vapid_keypair()[0]),',
              1,
          )

          path.write_text(text, encoding="utf-8")
          PY
      - name: Verify patch
        run: |
          python -m py_compile api/index.py
          grep -q "def vapid_keypair" api/index.py
          grep -q '"notifications": bool(vapid_keypair' api/index.py
      - name: Commit patch
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add api/index.py
          git commit -m "feat(push): enable stable server-side VAPID delivery"
          git push
