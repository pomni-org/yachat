name: fix v10 details
on:
  push:
    branches: [main]
    paths: [".github/workflows/fix-v10-details.yml"]
permissions:
  contents: write
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          python3 - <<'PY'
          from pathlib import Path
          p=Path('src/renderer/app.js')
          s=p.read_text(encoding='utf-8')
          s=s.replace('''  const context = canvas.getContext("2d");
  context.imageSmoothingEnabled = true;
  context.imageSmoothingQuality = "high";
  const zoom =''','''  const context = canvas.getContext("2d");
  const zoom =''',1)
          s=s.replace('''  canvas.width = side;
  canvas.height = side;
  context.drawImage''','''  canvas.width = side;
  canvas.height = side;
  context.imageSmoothingEnabled = true;
  context.imageSmoothingQuality = "high";
  context.drawImage''',1)
          s=s.replace('''  const value = Number(size) || 0;
  if (value >= 1024 * 1024) {''','''  const value = Number(size) || 0;
  if (value >= 1024 * 1024 * 1024) {
    return `${(value / 1024 / 1024 / 1024).toFixed(1)} ГБ`;
  }
  if (value >= 1024 * 1024) {''',1)
          p.write_text(s,encoding='utf-8')
          Path('.github/workflows/fix-v10-details.yml').unlink()
          PY
          node --check src/renderer/app.js
          git config user.name "YaChat Builder"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "fix(media): сохранить hd-аватары и показывать гигабайты [skip ci]"
          git push
