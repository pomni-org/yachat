name: fix web asset paths v9

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/fix-web-assets-v9.yml"

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: fix renderer and production asset paths
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          styles_path = root / 'src/renderer/styles.css'
          page_path = root / 'src/renderer/page.css'
          app_path = root / 'src/renderer/app.js'
          build_path = root / 'scripts/build-vercel.cjs'
          workflow_path = root / '.github/workflows/fix-web-assets-v9.yml'

          def read(path):
              return path.read_text(encoding='utf-8')

          def write(path, text):
              path.write_text(text, encoding='utf-8')

          styles = read(styles_path)
          styles = styles.replace('font-family: "Roboto";', 'font-family: "YaChat Sans";')
          styles = styles.replace('--font-main: "Roboto", "Segoe UI", Arial, sans-serif;', '--font-main: "YaChat Sans", "Segoe UI", Arial, sans-serif;')
          styles = styles.replace('--font-display: "Roboto", "Segoe UI", Arial, sans-serif;', '--font-display: "YaChat Sans", "Segoe UI", Arial, sans-serif;')
          styles = styles.replace('--font-logo: "Roboto", "Segoe UI", Arial, sans-serif;', '--font-logo: "YaChat Sans", "Segoe UI", Arial, sans-serif;')
          styles = styles.replace('url("./assets/yachat-logo-light.svg")', 'url("./assets/yachat-logo-light.png?v=9")')
          styles = styles.replace('url("./assets/yachat-logo-dark.svg")', 'url("./assets/yachat-logo-dark.png?v=9")')

          if 'font-weight: 700;\n  font-display: swap;' not in styles[:2200]:
              marker = '''@font-face {
  font-family: "YaChat Sans";
  src: url("./assets/roboto-v51-cyrillic_cyrillic-ext_latin-600.woff2") format("woff2");
  font-style: normal;
  font-weight: 600;
  font-display: swap;
}
'''
              extra = marker + '''
@font-face {
  font-family: "YaChat Sans";
  src: url("./assets/roboto-v51-cyrillic_cyrillic-ext_latin-600.woff2") format("woff2");
  font-style: normal;
  font-weight: 700;
  font-display: swap;
}
'''
              if marker not in styles:
                  raise SystemExit('600 weight font-face block not found in styles.css')
              styles = styles.replace(marker, extra, 1)

          write(styles_path, styles)

          page = read(page_path)
          page = page.replace('font-family: "Roboto";', 'font-family: "YaChat Sans";')
          page = page.replace('font-family: "Roboto", "Segoe UI", Arial, sans-serif;', 'font-family: "YaChat Sans", "Segoe UI", Arial, sans-serif;')
          write(page_path, page)

          app = read(app_path)
          app = re.sub(
              r'return "\./assets/yachat-codes-bot\.webp\?v=\d+";',
              'return "./assets/yachat-codes-bot.webp?v=2";',
              app,
              count=1,
          )
          write(app_path, app)

          build = read(build_path)
          build = build.replace('const BRAND_VERSION = "8";', 'const BRAND_VERSION = "9";')
          build = build.replace(
              "  content = content\n    .replaceAll(\"?v=4\", `?v=${BRAND_VERSION}`)\n    .replaceAll(\"?v=5\", `?v=${BRAND_VERSION}`)\n    .replaceAll(\"?v=6\", `?v=${BRAND_VERSION}`)\n    .replaceAll(\"?v=7\", `?v=${BRAND_VERSION}`)\n    .replace(/\\?v=\\d+(?:\\?v=\\d+)+/g, `?v=${BRAND_VERSION}`);",
              "  content = content\n    .replace(/\\?v=\\d+(?:\\?v=\\d+)*/g, `?v=${BRAND_VERSION}`);",
          )

          start = build.index('async function injectEnhancementAssets() {')
          end = build.index('\nasync function build() {', start)
          if start < 0 or end < 0:
              raise SystemExit('injectEnhancementAssets block not found')

          replacement = r'''async function prepareWebRuntimeAssets() {
  const indexPath = path.join(outputDir, "index.html");
  let html = await fs.readFile(indexPath, "utf8");
  html = html
    .replace('<link rel="stylesheet" href="./styles.css" />', `<link rel="stylesheet" href="/styles.css?v=${BRAND_VERSION}" />`)
    .replace('<script src="./app.js"></script>', `<script src="/app.js?v=${BRAND_VERSION}"></script>`);

  html = html.replace(
    `<link rel="stylesheet" href="/styles.css?v=${BRAND_VERSION}" />`,
    [
      `<link rel="stylesheet" href="/styles.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/chat-presence.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/username-copy.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/profile-modal.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/avatar-preview.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/loading-shine.css?v=${BRAND_VERSION}" />`,
      `    <link rel="stylesheet" href="/assets/verification-scope.css?v=${BRAND_VERSION}" />`
    ].join("\n")
  );

  html = html.replace(
    `<script src="/app.js?v=${BRAND_VERSION}"></script>`,
    [
      `<script src="/app.js?v=${BRAND_VERSION}"></script>`,
      `    <script src="/assets/chat-presence.js?v=${BRAND_VERSION}"></script>`,
      `    <script src="/assets/username-copy.js?v=${BRAND_VERSION}"></script>`,
      `    <script src="/assets/profile-modal.js?v=${BRAND_VERSION}"></script>`,
      `    <script src="/assets/contacts-sync-v2.js?v=${BRAND_VERSION}"></script>`,
      `    <script src="/assets/verification-scope.js?v=${BRAND_VERSION}"></script>`
    ].join("\n")
  );
  await fs.writeFile(indexPath, html, "utf8");

  for (const name of ["styles.css", "page.css"]) {
    const filePath = path.join(outputDir, name);
    let css = await fs.readFile(filePath, "utf8");
    css = css.replaceAll('url("./assets/', 'url("/assets/');
    await fs.writeFile(filePath, css, "utf8");
  }

  const appPath = path.join(outputDir, "app.js");
  let app = await fs.readFile(appPath, "utf8");
  app = app.replaceAll('"./assets/yachat-codes-bot.webp?v=2"', '"/assets/yachat-codes-bot.webp?v=2"');
  await fs.writeFile(appPath, app, "utf8");
}
'''
          build = build[:start] + replacement + build[end:]
          build = build.replace('  await injectEnhancementAssets();', '  await prepareWebRuntimeAssets();')
          write(build_path, build)

          workflow_path.unlink()
          PY

          npm run check
          npm run build:vercel

          python3 - <<'PY'
          from pathlib import Path
          import re

          public = Path('public')
          required = [
              'styles.css',
              'app.js',
              'assets/yachat-logo-light.png',
              'assets/yachat-logo-dark.png',
              'assets/yachat-codes-bot.webp',
              'assets/roboto-v51-cyrillic_cyrillic-ext_latin-regular.woff2',
              'assets/roboto-v51-cyrillic_cyrillic-ext_latin-500.woff2',
              'assets/roboto-v51-cyrillic_cyrillic-ext_latin-600.woff2',
          ]
          missing = [name for name in required if not (public / name).is_file()]
          if missing:
              raise SystemExit(f'missing production assets: {missing}')

          styles = (public / 'styles.css').read_text(encoding='utf-8')
          index = (public / 'index.html').read_text(encoding='utf-8')
          app = (public / 'app.js').read_text(encoding='utf-8')

          checks = {
              'font family': 'font-family: "YaChat Sans";' in styles,
              'absolute font url': 'url("/assets/roboto-v51' in styles,
              'direct png logo': 'url("/assets/yachat-logo-light.png?v=9")' in styles,
              'no svg wrapper logo': 'yachat-logo-light.svg' not in styles and 'yachat-logo-dark.svg' not in styles,
              'versioned main stylesheet': 'href="/styles.css?v=9"' in index,
              'versioned main script': 'src="/app.js?v=9"' in index,
              'absolute bot avatar': '"/assets/yachat-codes-bot.webp?v=2"' in app,
              'no relative production assets': 'url("./assets/' not in styles,
          }
          failed = [name for name, ok in checks.items() if not ok]
          if failed:
              raise SystemExit(f'production validation failed: {failed}')

          refs = set()
          for path in [public / 'index.html', public / 'styles.css', public / 'page.css', public / 'app.js']:
              text = path.read_text(encoding='utf-8')
              refs.update(re.findall(r'["\'(](\/assets\/[^"\')?]+)', text))

          broken = []
          for ref in refs:
              clean = ref.split('?', 1)[0].lstrip('/')
              if clean.startswith('assets/') and not (public / clean).exists():
                  broken.append(ref)
          if broken:
              raise SystemExit(f'broken local asset references: {sorted(broken)}')
          PY

          git config user.name "Помни"
          git config user.email "zgsu3589@gmail.com"
          git add -A
          git commit -m "fix(web): восстановить шрифт и абсолютные пути ассетов"
          git push
