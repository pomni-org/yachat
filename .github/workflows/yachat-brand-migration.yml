name: yachat brand migration

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/yachat-brand-migration.yml"

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: migrate brand and bot avatar
        shell: bash
        run: |
          set -euo pipefail

          python3 - <<'PY'
          from pathlib import Path
          import base64
          import re
          import subprocess

          root = Path(".")
          encoded_path = root / "scripts/.yachat-codes-bot.webp.base64"
          asset_path = root / "src/renderer/assets/yachat-codes-bot.webp"
          workflow_path = root / ".github/workflows/yachat-brand-migration.yml"

          if not encoded_path.exists():
              raise SystemExit("missing encoded bot avatar source")

          encoded = "".join(encoded_path.read_text(encoding="utf-8").split())
          avatar_bytes = base64.b64decode(encoded, validate=True)
          if not avatar_bytes.startswith(b"RIFF") or b"WEBP" not in avatar_bytes[:16]:
              raise SystemExit("decoded bot avatar is not a valid WebP container")

          asset_path.parent.mkdir(parents=True, exist_ok=True)
          asset_path.write_bytes(avatar_bytes)

          replacements = [
              ("--max-", "--yachat-"),
              ("MAX Sans", "Yachat Sans"),
              ("Max Sans", "Yachat Sans"),
              ("max sans", "yachat sans"),
              ("MAXSans", "YachatSans"),
              ("MaxSans", "YachatSans"),
              ("max-sans", "yachat-sans"),
              ("max_sans", "yachat_sans"),
          ]

          tracked = subprocess.check_output(["git", "ls-files", "-z"]).decode("utf-8").split("\0")
          skipped_paths = {encoded_path.as_posix(), workflow_path.as_posix()}

          for name in filter(None, tracked):
              if name in skipped_paths:
                  continue

              path = root / name
              if not path.is_file():
                  continue

              raw = path.read_bytes()
              if b"\0" in raw:
                  continue

              try:
                  text = raw.decode("utf-8")
              except UnicodeDecodeError:
                  continue

              original = text
              for before, after in replacements:
                  text = text.replace(before, after)

              text = re.sub(r"(?<![\w-])MAX(?![\w-])", "ЯЧат", text)
              text = re.sub(r"(?<![\w-])Max(?![\w-])", "ЯЧат", text)
              text = re.sub(r"(?i)\bmax\s+(messenger|мессенджер)\b", "ЯЧат", text)
              text = re.sub(r"(?i)\bmax\.ru\b", "yachat.vercel.app", text)

              text = re.sub(
                  r"(avatarDataUrl\s*:\s*)[\"'](?:\./|/)?assets/yachat-avatar\.svg[\"']",
                  r'\1"./assets/yachat-codes-bot.webp?v=1"',
                  text,
              )
              text = re.sub(
                  r"([\"']avatar_data_url[\"']\s*:\s*)[\"'](?:\./|/)?assets/yachat-avatar\.svg[\"']",
                  r'\1"/assets/yachat-codes-bot.webp?v=1"',
                  text,
              )

              if path.as_posix() == "src/renderer/app.js":
                  function_start = text.find("function chatAvatarSource(chat) {")
                  function_end = text.find("\n}", function_start)
                  function_body = text[function_start:function_end + 2] if function_start >= 0 and function_end >= 0 else ""

                  if function_start < 0:
                      raise SystemExit("chatAvatarSource marker not found")

                  if 'chat?.id === "yachat-codes"' not in function_body:
                      marker = "function chatAvatarSource(chat) {\n"
                      insertion = (
                          "function chatAvatarSource(chat) {\n"
                          "  if (chat?.id === \"yachat-codes\") {\n"
                          "    return \"./assets/yachat-codes-bot.webp?v=1\";\n"
                          "  }\n\n"
                      )
                      text = text.replace(marker, insertion, 1)

              if text != original:
                  path.write_text(text, encoding="utf-8")

          tracked_paths = [
              line for line in subprocess.check_output(["git", "ls-files"]).decode("utf-8").splitlines() if line
          ]
          rename_map = {}
          rename_tokens = [
              ("MAXSans", "YachatSans"),
              ("MaxSans", "YachatSans"),
              ("max-sans", "yachat-sans"),
              ("max_sans", "yachat_sans"),
          ]

          for old in sorted(tracked_paths, key=len, reverse=True):
              new = old
              for before, after in rename_tokens:
                  new = new.replace(before, after)
              if new != old:
                  rename_map[old] = new

          if rename_map:
              for path in root.rglob("*"):
                  if not path.is_file() or ".git" in path.parts:
                      continue

                  raw = path.read_bytes()
                  if b"\0" in raw:
                      continue

                  try:
                      text = raw.decode("utf-8")
                  except UnicodeDecodeError:
                      continue

                  original = text
                  for old, new in rename_map.items():
                      text = text.replace(old, new)
                      text = text.replace(Path(old).name, Path(new).name)

                  if text != original:
                      path.write_text(text, encoding="utf-8")

              for old, new in rename_map.items():
                  Path(new).parent.mkdir(parents=True, exist_ok=True)
                  subprocess.run(["git", "mv", old, new], check=True)

          encoded_path.unlink()
          workflow_path.unlink()
          PY

          npm install
          npm run check
          npm run build:vercel

          test -s src/renderer/assets/yachat-codes-bot.webp
          ! git grep -n -- '--max-'
          ! git grep -nEi 'max[-_ ]?sans'
          git grep -n 'yachat-codes-bot.webp'

          git config user.name "Помни"
          git config user.email "zgsu3589@gmail.com"
          git add -A
          git commit -m "fix(brand): обновить бота кодов и удалить следы MAX [skip ci]"
          git push
