name: Apply YaChat brand assets once

on:
  push:
    branches:
      - codex/yachat-brand-icons
    paths:
      - ".github/workflows/apply-yachat-brand.yml"
      - "scripts/apply-yachat-brand.py"
      - "src/renderer/assets/yachat-*.svg"

permissions:
  contents: write

jobs:
  apply-brand:
    if: ${{ !contains(github.event.head_commit.message, '[brand-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install SVG and icon tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick librsvg2-bin

      - name: Apply canonical icons and remove legacy MAX assets
        run: python scripts/apply-yachat-brand.py

      - name: Validate JavaScript and Python
        run: |
          npm run check
          python -m py_compile api/index.py

      - name: Commit generated replacements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git commit -m "chore: apply complete ЯЧат icon set [brand-applied]"
          git push origin HEAD:codex/yachat-brand-icons
