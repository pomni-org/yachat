name: Apply device code and media migration

on:
  push:
    paths:
      - .github/workflows/codex-device-auth-v29.yml

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply server migration
        run: python scripts/codex-device-auth-v29.py
      - name: Verify server source
        run: |
          python -m py_compile api/index.py
          grep -q 'DEVICE_CODE_TTL_MINUTES = 10' api/index.py
          grep -q '@app.post("/api/device-code/redeem")' api/index.py
          grep -q '2026-07-clear-verification-code-history' api/index.py
          grep -q 'ttl=0' api/index.py
          grep -q 'return \[\]' api/index.py
      - name: Build production output
        run: |
          npm install
          npm run build:vercel
      - name: Commit migrated server
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add api/index.py
          git commit -m "feat(auth): replace QR sessions with device sign-in codes"
          git push
