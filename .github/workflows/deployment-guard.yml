name: Deployment guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Validate source and Vercel layout
        run: npm run check

      - name: Build the public deployment bundle
        run: npm run build

      - name: Run desktop and mobile browser smoke tests
        id: browser_smoke
        continue-on-error: true
        run: npm run test:browser

      - name: Upload browser smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-report
          path: runtime-smoke-report.json
          if-no-files-found: error
          retention-days: 3

      - name: Enforce browser smoke result
        run: |
          node -e "const report=require('./runtime-smoke-report.json'); if(!report.passed){console.error(report.stderr || report.error || report); process.exit(1)}"

      - name: Promote tested preview to production
        id: promote
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/promote-tested-runtime-preview'
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          : > promotion-report.txt
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "secret_present=false" >> promotion-report.txt
            echo "result=VERCEL_TOKEN is not configured in GitHub Actions secrets." >> promotion-report.txt
            exit 1
          fi
          echo "secret_present=true" >> promotion-report.txt
          set +e
          npx --yes vercel@latest promote yachat-116f0hmas-yachat.vercel.app --scope yachat --token "$VERCEL_TOKEN" --yes > promotion-output.txt 2>&1
          status=$?
          set -e
          sed -E 's/(token|Authorization|Bearer)[=: ]+[^ ]+/\1=[REDACTED]/Ig' promotion-output.txt >> promotion-report.txt
          echo "exit_code=$status" >> promotion-report.txt
          exit "$status"

      - name: Upload promotion report
        if: always() && github.event_name == 'pull_request' && github.head_ref == 'agent/promote-tested-runtime-preview'
        uses: actions/upload-artifact@v4
        with:
          name: promotion-report
          path: promotion-report.txt
          if-no-files-found: error
          retention-days: 1

      - name: Enforce promotion result
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/promote-tested-runtime-preview'
        run: |
          if [ "${{ steps.promote.outcome }}" != "success" ]; then
            cat promotion-report.txt
            exit 1
          fi
