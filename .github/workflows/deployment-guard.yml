name: Deployment guard

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Validate source and Vercel layout
        run: npm run check

      - name: Build the public deployment bundle
        run: npm run build

      - name: Run desktop and mobile browser smoke tests
        id: browser_smoke
        continue-on-error: true
        run: npm run test:browser

      - name: Upload browser smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-smoke-report
          path: runtime-smoke-report.json
          if-no-files-found: error
          retention-days: 3

      - name: Enforce browser smoke result
        if: steps.browser_smoke.outcome != 'success'
        run: |
          cat runtime-smoke-report.json
          exit 1
