name: Apply media and emoji upgrade

on:
  push:
    paths:
      - .github/workflows/codex-media-emoji-patch.yml

permissions:
  contents: write

jobs:
  upgrade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply composer upgrade
        run: python scripts/codex-media-emoji-patch.py
      - name: Verify source files
        run: |
          python -m py_compile scripts/codex-media-emoji-patch.py
          node --check src/renderer/assets/media-emoji-upgrade.js
          grep -q "mediaQueue" src/renderer/assets/media-emoji-upgrade.js
          grep -q "data-convert-attachment" src/renderer/assets/media-emoji-upgrade.js
          grep -q "emoji-picker" src/renderer/assets/media-emoji-upgrade.js
          grep -q 'BRAND_VERSION = "27"' scripts/build-vercel.cjs
      - name: Build production output
        run: |
          npm install
          npm run build:vercel
          node --check public/assets/media-emoji-upgrade.js
          grep -q "media-emoji-upgrade.css?v=27" public/index.html
          grep -q "media-emoji-upgrade.js?v=27" public/index.html
      - name: Commit upgraded composer
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add src/renderer/assets/media-emoji-upgrade.js src/renderer/assets/media-emoji-upgrade.css scripts/build-vercel.cjs
          git commit -m "feat(composer): add responsive photos and emoji picker"
          git push
