name: Composer emoji iOS regression

on:
  push:
    branches: [main]
    paths:
      - src/renderer/assets/rich-composer-stable.js
      - src/renderer/assets/message-mentions.js
      - src/renderer/assets/media-emoji-upgrade.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - src/renderer/assets/mobile-chat-stable.js
      - src/renderer/assets/ios-composer-caret-guard.js
      - tests/composer-emoji-ios-regression.mjs
      - .github/workflows/composer-emoji-ios-regression.yml
  pull_request:
    paths:
      - src/renderer/assets/rich-composer-stable.js
      - src/renderer/assets/message-mentions.js
      - src/renderer/assets/media-emoji-upgrade.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - src/renderer/assets/mobile-chat-stable.js
      - src/renderer/assets/ios-composer-caret-guard.js
      - tests/composer-emoji-ios-regression.mjs
      - .github/workflows/composer-emoji-ios-regression.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium-ios-emulation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright core
        run: npm install --no-save playwright-core@1.55.0

      - name: Locate Chrome
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version

      - name: Run emoji and caret regression suite
        id: regression
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/composer-emoji-ios-regression.mjs > composer-test-output.txt 2>&1
          code=$?
          echo "$code" > composer-test-exit-code.txt
          cat composer-test-output.txt
          exit "$code"

      - name: Upload complete regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-emoji-test-output
          path: |
            composer-test-output.txt
            composer-test-exit-code.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when regression failed
        if: always()
        run: |
          code="$(cat composer-test-exit-code.txt 2>/dev/null || echo 1)"
          cat composer-test-output.txt 2>/dev/null || true
          test "$code" = "0"
