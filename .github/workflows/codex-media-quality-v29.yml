name: Apply photo quality and stability patch

on:
  push:
    paths:
      - .github/workflows/codex-media-quality-v29.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply media quality patch
        run: python scripts/codex-media-quality-v29.py
      - name: Verify sources
        run: |
          python -m py_compile scripts/codex-media-quality-v29.py api/index.py
          node --check src/renderer/app.js
          node --check src/renderer/assets/media-emoji-upgrade.js
          grep -q 'PHOTO_PACKAGE_BUDGET_BYTES' src/renderer/assets/media-emoji-upgrade.js
          grep -q 'canvas.toDataURL("image/webp", 0.96)' src/renderer/app.js
          grep -q 'Войти по коду' src/renderer/index.html
      - name: Build production output
        run: |
          npm install
          npm run build:vercel
          node --check public/app.js
          node --check public/assets/media-emoji-upgrade.js
      - name: Commit quality fixes
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add api/index.py src/renderer/app.js src/renderer/index.html src/renderer/assets/media-emoji-upgrade.js
          git commit -m "fix(media): preserve photo quality without blocking Safari"
          git push
