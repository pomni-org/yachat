name: Native iOS textarea composer

# Regression rerun against the v73 Enter fallback.
on:
  pull_request:
    paths:
      - src/renderer/assets/rich-composer-stable.js
      - src/renderer/assets/ios-native-textarea.js
      - src/renderer/assets/ios-native-mentions.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - tests/composer-ios-native-textarea.mjs
      - .github/workflows/composer-ios-native-textarea.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  chromium-ios-emulation:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright core
        run: npm install --no-save playwright-core@1.55.0

      - name: Locate Chrome
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version

      - name: Run native textarea composer suite
        id: regression
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/composer-ios-native-textarea.mjs > native-textarea-output.txt 2>&1
          code=$?
          echo "$code" > native-textarea-exit-code.txt
          cat native-textarea-output.txt
          exit "$code"

      - name: Upload complete regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: native-ios-textarea-output
          path: |
            native-textarea-output.txt
            native-textarea-exit-code.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when regression failed
        if: always()
        run: |
          code="$(cat native-textarea-exit-code.txt 2>/dev/null || echo 1)"
          cat native-textarea-output.txt 2>/dev/null || true
          test "$code" = "0"
