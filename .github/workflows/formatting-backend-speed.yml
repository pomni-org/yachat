name: Formatting and backend speed

on:
  pull_request:
    paths:
      - src/renderer/assets/ios-native-textarea.js
      - src/renderer/assets/ios-native-formatting.js
      - src/renderer/assets/frontend-first-runtime.js
      - src/renderer/assets/composer-delivery-stable.js
      - api/message.py
      - api/chat_poll.py
      - server/database.py
      - tests/ios-native-formatting.mjs
      - tests/composer-ios-native-textarea.mjs
      - tests/frontend-first-delivery.mjs
      - tests/test_message_performance.py
      - tests/test_chat_poll_queries.py
      - scripts/build-vercel.cjs
      - .github/workflows/formatting-backend-speed.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-composer:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright core
        run: npm install --no-save playwright-core@1.55.0
      - name: Locate Chrome
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version
      - name: Verify native textarea remains stable
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node tests/composer-ios-native-textarea.mjs
      - name: Verify native textarea formatting
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node tests/ios-native-formatting.mjs
      - name: Verify optimistic compact delivery
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node tests/frontend-first-delivery.mjs
      - name: Verify runtime syntax
        run: |
          node --check src/renderer/assets/ios-native-textarea.js
          node --check src/renderer/assets/ios-native-formatting.js
          node --check src/renderer/assets/frontend-first-runtime.js
          node --check src/renderer/assets/composer-delivery-stable.js
          node --check scripts/build-vercel.cjs

  backend-writes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify Python syntax
        run: |
          python -m py_compile api/message.py api/chat_poll.py server/database.py
          python -m py_compile tests/test_message_performance.py tests/test_chat_poll_queries.py
      - name: Test compact writes and physical deletion
        run: python -m unittest tests.test_message_performance -v
      - name: Test combined chat polling query
        run: python -m unittest tests.test_chat_poll_queries -v
