name: Formatting and backend speed

on:
  pull_request:
    paths:
      - src/renderer/assets/ios-native-textarea.js
      - src/renderer/assets/ios-native-formatting.js
      - src/renderer/assets/ios-format-selection-guard.js
      - src/renderer/assets/composer-enter-stable.js
      - src/renderer/assets/frontend-first-runtime.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - src/renderer/assets/private-chat-presence.js
      - src/renderer/assets/settings-detail-layout.css
      - src/renderer/assets/settings-detail-navigation.js
      - src/renderer/assets/avatar-preserve.css
      - src/renderer/assets/avatar-preserve.js
      - api/message.py
      - api/chat_poll.py
      - api/digital_id_blocked.py
      - server/database.py
      - tests/ios-native-formatting.mjs
      - tests/composer-ios-native-textarea.mjs
      - tests/frontend-first-delivery.mjs
      - tests/private-chat-presence.mjs
      - tests/settings-detail-navigation.mjs
      - tests/avatar-preserve.mjs
      - tests/existing-profile-avatar.mjs
      - tests/existing-profile-avatar-flow.mjs
      - tests/test_message_performance.py
      - tests/test_chat_poll_queries.py
      - tests/test_digital_id_migration.py
      - scripts/build-vercel.cjs
      - package.json
      - supabase/migrations/20260723030000_digital_id_single_script.sql
      - vercel.json
      - .github/workflows/formatting-backend-speed.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ios-composer:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Playwright core
        run: npm install --no-save playwright-core@1.55.0
      - name: Locate Chrome
        run: |
          test -x /usr/bin/google-chrome
          /usr/bin/google-chrome --version
      - name: Verify settings detail header and navigation
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node tests/settings-detail-navigation.mjs
      - name: Verify lossless avatar positioning and Digital IDs
        id: avatar
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/avatar-preserve.mjs > avatar-test-output.txt 2>&1
          code=$?
          echo "$code" > avatar-test-exit-code.txt
          cat avatar-test-output.txt
          exit "$code"
      - name: Verify existing profile avatar replacement
        id: profile-avatar
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/existing-profile-avatar.mjs > profile-avatar-test-output.txt 2>&1
          code=$?
          echo "$code" > profile-avatar-test-exit-code.txt
          cat profile-avatar-test-output.txt
          exit "$code"
      - name: Verify full existing profile avatar save flow
        id: profile-avatar-flow
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/existing-profile-avatar-flow.mjs > profile-avatar-flow-test-output.txt 2>&1
          code=$?
          echo "$code" > profile-avatar-flow-test-exit-code.txt
          cat profile-avatar-flow-test-output.txt
          exit "$code"
      - name: Verify private chat routing and read receipts
        id: private-chat
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/private-chat-presence.mjs > private-chat-test-output.txt 2>&1
          code=$?
          echo "$code" > private-chat-test-exit-code.txt
          cat private-chat-test-output.txt
          exit "$code"
      - name: Verify native textarea remains stable
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: node tests/composer-ios-native-textarea.mjs
      - name: Verify native textarea formatting
        id: formatting
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/ios-native-formatting.mjs > formatting-test-output.txt 2>&1
          code=$?
          echo "$code" > formatting-test-exit-code.txt
          cat formatting-test-output.txt
          exit "$code"
      - name: Verify first-tap compact delivery
        id: delivery
        continue-on-error: true
        env:
          CHROME_BIN: /usr/bin/google-chrome
        run: |
          set +e
          node tests/frontend-first-delivery.mjs > delivery-test-output.txt 2>&1
          code=$?
          echo "$code" > delivery-test-exit-code.txt
          cat delivery-test-output.txt
          exit "$code"
      - name: Verify runtime syntax
        run: |
          node --check src/renderer/assets/ios-native-textarea.js
          node --check src/renderer/assets/ios-native-formatting.js
          node --check src/renderer/assets/ios-format-selection-guard.js
          node --check src/renderer/assets/composer-enter-stable.js
          node --check src/renderer/assets/frontend-first-runtime.js
          node --check src/renderer/assets/composer-delivery-stable.js
          node --check src/renderer/assets/composer-actions-stable.js
          node --check src/renderer/assets/private-chat-presence.js
          node --check src/renderer/assets/settings-detail-navigation.js
          node --check src/renderer/assets/avatar-preserve.js
          node --check tests/settings-detail-navigation.mjs
          node --check tests/avatar-preserve.mjs
          node --check tests/existing-profile-avatar.mjs
          node --check tests/existing-profile-avatar-flow.mjs
          node --check tests/private-chat-presence.mjs
          node --check tests/frontend-first-delivery.mjs
          node --check scripts/build-vercel.cjs
          node -e "JSON.parse(require('fs').readFileSync('package.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('vercel.json', 'utf8'))"
      - name: Build Vercel bundle
        run: npm run build:vercel
      - name: Verify v86 assets in bundle
        run: |
          test -f public/assets/avatar-preserve.css
          test -f public/assets/avatar-preserve.js
          test -f public/assets/private-chat-presence.js
          grep -Fq '/assets/composer-delivery-stable.js?v=86' public/index.html
          grep -Fq '/assets/composer-actions-stable.js?v=86' public/index.html
          grep -Fq '/assets/private-chat-presence.js?v=86' public/index.html
          grep -Fq '/assets/avatar-preserve.css?v=86' public/index.html
          grep -Fq '/assets/avatar-preserve.js?v=86' public/index.html
      - name: Upload browser regression output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: avatar-formatting-delivery-test-output
          path: |
            avatar-test-output.txt
            avatar-test-exit-code.txt
            profile-avatar-test-output.txt
            profile-avatar-test-exit-code.txt
            profile-avatar-flow-test-output.txt
            profile-avatar-flow-test-exit-code.txt
            private-chat-test-output.txt
            private-chat-test-exit-code.txt
            formatting-test-output.txt
            formatting-test-exit-code.txt
            delivery-test-output.txt
            delivery-test-exit-code.txt
          if-no-files-found: warn
          retention-days: 3
      - name: Fail when a browser regression failed
        if: always()
        run: |
          avatar_code="$(cat avatar-test-exit-code.txt 2>/dev/null || echo 1)"
          profile_avatar_code="$(cat profile-avatar-test-exit-code.txt 2>/dev/null || echo 1)"
          profile_avatar_flow_code="$(cat profile-avatar-flow-test-exit-code.txt 2>/dev/null || echo 1)"
          private_chat_code="$(cat private-chat-test-exit-code.txt 2>/dev/null || echo 1)"
          formatting_code="$(cat formatting-test-exit-code.txt 2>/dev/null || echo 1)"
          delivery_code="$(cat delivery-test-exit-code.txt 2>/dev/null || echo 1)"
          test "$avatar_code" = "0"
          test "$profile_avatar_code" = "0"
          test "$profile_avatar_flow_code" = "0"
          test "$private_chat_code" = "0"
          test "$formatting_code" = "0"
          test "$delivery_code" = "0"

  backend-writes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt
      - name: Verify Python syntax
        run: |
          python -m py_compile api/message.py api/chat_poll.py api/digital_id_blocked.py server/database.py
          python -m py_compile tests/test_message_performance.py tests/test_chat_poll_queries.py tests/test_digital_id_migration.py
      - name: Test compact writes and physical deletion
        run: python -m unittest tests.test_message_performance -v
      - name: Test combined chat polling query
        run: python -m unittest tests.test_chat_poll_queries -v
      - name: Test single-script Digital ID migration
        run: python -m unittest tests.test_digital_id_migration -v
