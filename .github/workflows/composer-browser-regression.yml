name: Composer browser regression

on:
  push:
    branches: [main]
    paths:
      - src/renderer/assets/rich-composer-stable.js
      - src/renderer/assets/message-mentions.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - src/renderer/assets/mobile-chat-stable.js
      - tests/composer-browser-regression.mjs
      - .github/workflows/composer-browser-regression.yml
  pull_request:
    paths:
      - src/renderer/assets/rich-composer-stable.js
      - src/renderer/assets/message-mentions.js
      - src/renderer/assets/composer-delivery-stable.js
      - src/renderer/assets/composer-actions-stable.js
      - src/renderer/assets/mobile-chat-stable.js
      - tests/composer-browser-regression.mjs
      - .github/workflows/composer-browser-regression.yml

permissions:
  contents: read

jobs:
  chromium:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Playwright
        run: npm install --no-save playwright@1.55.0

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run composer regression suite
        id: regression
        continue-on-error: true
        run: |
          set +e
          node tests/composer-browser-regression.mjs > composer-browser-output.txt 2>&1
          code=$?
          echo "$code" > composer-browser-exit-code.txt
          cat composer-browser-output.txt
          exit "$code"

      - name: Upload complete browser output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: composer-browser-test-output
          path: |
            composer-browser-output.txt
            composer-browser-exit-code.txt
          if-no-files-found: error
          retention-days: 3

      - name: Fail when regression failed
        if: always()
        run: |
          code="$(cat composer-browser-exit-code.txt 2>/dev/null || echo 1)"
          cat composer-browser-output.txt 2>/dev/null || true
          test "$code" = "0"
