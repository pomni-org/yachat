name: Finalize YaChat v29

on:
  push:
    paths:
      - .github/workflows/codex-finalize-v29.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply final v29 patch
        run: python scripts/codex-finalize-v29.py
      - name: Verify sources
        run: |
          python -m py_compile scripts/codex-finalize-v29.py api/index.py
          node --check src/renderer/app.js
          node --check src/renderer/assets/system-upgrade-v29.js
          node --check src/renderer/assets/media-emoji-upgrade.js
          grep -q 'BRAND_VERSION = "29"' scripts/build-vercel.cjs
          grep -q 'system-upgrade-v29.js' scripts/build-vercel.cjs
          grep -q 'data-open-device-code-security' src/renderer/assets/settings-redesign.js
          ! grep -q 'QR-сессия' src/renderer/help.html
      - name: Build production output
        run: |
          npm install
          npm run build:vercel
          node --check public/app.js
          node --check public/assets/system-upgrade-v29.js
          grep -q 'system-upgrade-v29.js?v=29' public/index.html
          grep -q 'system-upgrade-v29.css?v=29' public/index.html
      - name: Commit final v29 implementation
        run: |
          git config user.name "ЯЧат Codex"
          git config user.email "actions@users.noreply.github.com"
          git add src/renderer/app.js src/renderer/help.html src/renderer/sw.js src/renderer/assets/settings-redesign.js src/renderer/assets/system-upgrade-v29.js scripts/build-vercel.cjs
          git commit -m "feat(v29): ship device codes, fast media and profile fixes"
          git push
